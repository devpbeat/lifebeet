version: '3.8'

services:
  # PostgreSQL Database (for local development)
  postgres:
    image: postgres:15-alpine
    container_name: lifebeet-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lifebeet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lifebeet-network

  # Next.js Application (production)
  app:
    image: ghcr.io/devpbeat/lifebeet:latest
    container_name: lifebeet-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lifebeet
      # Supabase (set these in .env or directly)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      # Node
      NODE_ENV: production
    depends_on:
      - postgres
    networks:
      - lifebeet-network
    # Uncomment to use local .env file
    # env_file:
    #   - .env

volumes:
  postgres_data:

networks:
  lifebeet-network:
    driver: bridge
